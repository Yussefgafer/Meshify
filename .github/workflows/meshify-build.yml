name: Meshify Build & Release

on:
  push:
    branches: [ "master", "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "master", "main" ]

jobs:
  validation:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}
          generate-job-summary: true
          gradle-home-cache-cleanup: true

      - name: Run Lint
        run: ./gradlew lintDebug --continue


  build:
    name: Build APK
    needs: validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}
          generate-job-summary: true
          gradle-home-cache-cleanup: true

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ ! -z "$KEYSTORE_BASE64" ]; then
            echo "Decoding keystore..."
            echo -n "$KEYSTORE_BASE64" | base64 -d > meshify.jks
          else
            echo "KEYSTORE_BASE64 is missing. Skipping release signing."
          fi

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug

      - name: Build Release APK
        run: |
          if [ -f meshify.jks ]; then
            ./gradlew :app:assembleRelease
          else
            echo "Keystore file is missing. Skipping release build."
          fi
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Get Version info
        id: version_info
        run: |
          VERSION_NAME=$(grep "versionName =" app/build.gradle.kts | awk -F'"' '{print $2}')
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "branch=${GITHUB_REF##*/}" >> $GITHUB_OUTPUT

      - name: Prepare Artifacts
        run: |
          mkdir -p build-artifacts
          if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
            cp app/build/outputs/apk/debug/app-debug.apk build-artifacts/Meshify-Debug-${{ steps.version_info.outputs.version_name }}.apk
          fi
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            cp app/build/outputs/apk/release/app-release.apk build-artifacts/Meshify-Release-${{ steps.version_info.outputs.version_name }}.apk
          elif [ -f app/build/outputs/apk/release/app-release-unsigned.apk ]; then
            cp app/build/outputs/apk/release/app-release-unsigned.apk build-artifacts/Meshify-Release-${{ steps.version_info.outputs.version_name }}-unsigned.apk
          fi

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: Meshify-Builds
          path: build-artifacts/*.apk
          retention-days: 7

  release:
    name: GitHub Release
    permissions:
      contents: write
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: Meshify-Builds
          path: .

      - name: Extract Changelog
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="V$VERSION" \
            '/^V[0-9]/ { if (flag) exit; if ($0 == ver) flag=1; next } \
             flag' CHANGELOG.md > release_body.md
          echo "Written $(wc -l < release_body.md) lines"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
          body_path: release_body.md
          files: |
            *.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
